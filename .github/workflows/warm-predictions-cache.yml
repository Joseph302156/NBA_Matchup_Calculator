# Optional: warm predictions_date_cache (add repo secret DATABASE_URL, then enable schedule).
# Repo → Settings → Secrets and variables → Actions → New secret: DATABASE_URL
# stats.nba.com often times out from GitHub-hosted IPs; reliable warm = local cron or self-hosted runner.
# WARM_CIJOB_NOFAIL keeps the cron green when NBA blocks the runner (cache may stay stale).
name: Warm predictions cache

on:
  workflow_dispatch:
  schedule:
    # Every hour UTC; the step below only warms during 08:00–16:00 America/Los_Angeles (PT).
    - cron: "0 * * * *"

jobs:
  warm:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # GitHub runners often hit stats.nba.com slowly; be gentle + long reads.
      NBA_STATS_TIMEOUT_SECONDS: "120"
      PIPELINE_PARALLEL_WORKERS: "1"
      WARM_CACHE_PAUSE_SECONDS: "12"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      WARM_CACHE_DAYS_AHEAD: "7"
      WARM_CIJOB_NOFAIL: "1"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Warm predictions cache
        run: |
          # Manual "Run workflow" always runs. Scheduled runs only 8am–4pm Pacific.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "workflow_dispatch → run warm (no time window)"
            python scripts/warm_predictions_cache.py
            exit $?
          fi
          H=$(python -c "from datetime import datetime; from zoneinfo import ZoneInfo; print(datetime.now(ZoneInfo('America/Los_Angeles')).hour)")
          if [ "$H" -lt 8 ] || [ "$H" -gt 16 ]; then
            echo "Skip scheduled warm: America/Los_Angeles hour=$H (window 08–16 inclusive, PT)"
            exit 0
          fi
          echo "America/Los_Angeles hour=$H → running warm"
          python scripts/warm_predictions_cache.py

# Optional: warm predictions_date_cache (add repo secret DATABASE_URL, then enable schedule).
# Repo → Settings → Secrets and variables → Actions → New secret: DATABASE_URL
name: Warm predictions cache

on:
  workflow_dispatch:
  schedule:
    # Every hour at :00 UTC (valid 5-field cron). Use */45 * * * * for every 45 min, etc.
    - cron: "0 * * * *"

jobs:
  warm:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # GitHub runners often hit stats.nba.com slowly; be gentle + long reads.
      NBA_STATS_TIMEOUT_SECONDS: "120"
      PIPELINE_PARALLEL_WORKERS: "1"
      WARM_CACHE_PAUSE_SECONDS: "12"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      WARM_CACHE_DAYS_AHEAD: "14"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scripts/warm_predictions_cache.py
